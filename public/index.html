<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a0533">
    <title>Luna</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0d0118;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.08);
            --border-focus: rgba(180,130,255,0.5);
            --accent: #c084fc;
            --accent-dim: rgba(192,132,252,0.15);
            --accent-glow: rgba(192,132,252,0.3);
            --text: #f0e9ff;
            --text-muted: rgba(240,233,255,0.45);
            --text-faint: rgba(240,233,255,0.2);
            --danger: #f87171;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overscroll-behavior: none;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Background orbs */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(139,68,255,0.18) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -20%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: calc(var(--safe-top) + 16px) 20px 14px;
            background: linear-gradient(to bottom, rgba(13,1,24,0.95) 80%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            color: var(--text);
            line-height: 1;
        }

        .header h1 span {
            color: var(--accent);
        }

        .header p {
            font-size: 0.7rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ── Scrollable feed ── */
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px;
            position: relative;
            z-index: 1;
            -webkit-overflow-scrolling: touch;
        }

        /* ── Confession card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            margin-bottom: 10px;
            position: relative;
            transition: background 0.2s;
            animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .card:active {
            background: var(--surface-hover);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .card-author {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 0.95rem;
            color: var(--accent);
            letter-spacing: 0.02em;
        }

        .card-delete {
            background: none;
            border: none;
            color: var(--text-faint);
            cursor: pointer;
            padding: 4px;
            border-radius: 8px;
            line-height: 0;
            transition: color 0.2s, background 0.2s;
            touch-action: manipulation;
            min-width: 32px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-delete:active {
            color: var(--danger);
            background: rgba(248,113,113,0.1);
        }

        .card-message {
            font-size: 0.95rem;
            font-weight: 300;
            line-height: 1.65;
            color: var(--text);
            word-break: break-word;
        }

        .card-date {
            font-size: 0.65rem;
            color: var(--text-faint);
            margin-top: 10px;
            letter-spacing: 0.06em;
        }

        /* Color accent per card */
        .card:nth-child(5n+1) { border-color: rgba(192,132,252,0.18); }
        .card:nth-child(5n+2) { border-color: rgba(129,140,248,0.18); }
        .card:nth-child(5n+3) { border-color: rgba(232,121,249,0.18); }
        .card:nth-child(5n+4) { border-color: rgba(167,139,250,0.18); }
        .card:nth-child(5n+0) { border-color: rgba(99,102,241,0.18); }

        /* ── Empty / Loading states ── */
        .state-msg {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-faint);
        }

        .state-msg .icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .state-msg p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
        }

        .state-msg small {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 6px;
            display: block;
            color: var(--text-faint);
        }

        /* ── Compose area ── */
        .compose {
            position: sticky;
            bottom: 0;
            z-index: 50;
            background: linear-gradient(to top, rgba(13,1,24,1) 70%, transparent);
            padding: 12px 16px calc(var(--safe-bottom) + 14px);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .compose-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 12px 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .compose-box:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .compose-name {
            background: none;
            border: none;
            outline: none;
            width: 100%;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.9rem;
            font-style: italic;
            color: var(--accent);
            padding: 0 0 8px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
            caret-color: var(--accent);
        }

        .compose-name::placeholder {
            color: rgba(192,132,252,0.3);
            font-style: italic;
        }

        .compose-textarea {
            background: none;
            border: none;
            outline: none;
            width: 100%;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 300;
            color: var(--text);
            resize: none;
            line-height: 1.6;
            max-height: 100px;
            min-height: 44px;
            overflow-y: auto;
            caret-color: var(--accent);
        }

        .compose-textarea::placeholder {
            color: var(--text-faint);
        }

        .compose-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .compose-hint {
            font-size: 0.65rem;
            color: var(--text-faint);
            letter-spacing: 0.06em;
        }

        .compose-send {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            touch-action: manipulation;
            flex-shrink: 0;
            box-shadow: 0 0 14px var(--accent-glow);
        }

        .compose-send:active {
            transform: scale(0.92);
            background: #a855f7;
        }

        .compose-send:disabled {
            opacity: 0.35;
            box-shadow: none;
        }

        .compose-send svg {
            width: 18px;
            height: 18px;
            fill: #0d0118;
        }

        .compose-send.loading svg {
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error-msg {
            font-size: 0.72rem;
            color: var(--danger);
            margin-top: 6px;
            padding-left: 2px;
            display: none;
        }

        .error-msg.show { display: block; }

        /* ── Delete confirm overlay ── */
        .confirm-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(13,1,24,0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: flex-end;
            padding: 16px;
            padding-bottom: calc(var(--safe-bottom) + 16px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .confirm-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .confirm-sheet {
            width: 100%;
            background: #1a0533;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transform: translateY(20px);
            transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .confirm-overlay.show .confirm-sheet {
            transform: translateY(0);
        }

        .confirm-sheet p {
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .confirm-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .confirm-btn {
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.12s;
            touch-action: manipulation;
        }

        .confirm-btn:active { transform: scale(0.97); }

        .confirm-cancel {
            background: var(--surface-hover);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .confirm-delete {
            background: rgba(248,113,113,0.15);
            color: var(--danger);
            border: 1px solid rgba(248,113,113,0.25);
        }

        /* Scrollbar */
        .feed::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>L<span>u</span>na</h1>
        <p>Deja aquí lo que sientes</p>
    </header>

    <!-- Feed -->
    <main class="feed" id="feed">
        <div class="state-msg">
            <div class="icon">🌙</div>
            <p>Cargando confesiones...</p>
        </div>
    </main>

    <!-- Compose -->
    <div class="compose">
        <div class="compose-box">
            <input
                type="text"
                id="nameInput"
                placeholder="tu nombre (opcional)"
                autocomplete="off"
                autocorrect="off"
                class="compose-name"
            >
            <textarea
                id="msgInput"
                placeholder="Escribe tu confesión..."
                rows="2"
                class="compose-textarea"
            ></textarea>
            <div class="compose-footer">
                <span class="compose-hint">Ctrl+Enter para enviar</span>
                <button class="compose-send" id="sendBtn" onclick="submitConfession()">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </div>
        <p class="error-msg" id="errorMsg"></p>
    </div>

    <!-- Delete confirm sheet -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-sheet">
            <p>¿Borrar esta confesión?</p>
            <div class="confirm-actions">
                <button class="confirm-btn confirm-cancel" onclick="closeConfirm()">Cancelar</button>
                <button class="confirm-btn confirm-delete" id="confirmDeleteBtn">Borrar</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/confessions';
        let pendingDeleteId = null;

        // ── Auto-resize textarea ──
        const msgInput = document.getElementById('msgInput');
        msgInput.addEventListener('input', () => {
            msgInput.style.height = 'auto';
            msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + 'px';
        });

        // ── Fetch ──
        async function fetchConfessions() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error();
                renderConfessions(await res.json());
            } catch {
                document.getElementById('feed').innerHTML = `
                    <div class="state-msg">
                        <div class="icon">⚠️</div>
                        <p>Error al cargar</p>
                        <small>Asegúrate de que el servidor esté corriendo</small>
                    </div>`;
            }
        }

        // ── Submit ──
        async function submitConfession() {
            const author  = document.getElementById('nameInput').value.trim();
            const message = msgInput.value.trim();
            const sendBtn = document.getElementById('sendBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (!message) {
                showError('Escribe algo primero');
                return;
            }

            sendBtn.disabled = true;
            sendBtn.classList.add('loading');
            sendBtn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#0d0118"><path d="M12 2a10 10 0 0 1 10 10h-2a8 8 0 0 0-8-8V2z"/></svg>`;
            errorMsg.classList.remove('show');

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ author, message })
                });
                if (!res.ok) throw new Error();
                document.getElementById('nameInput').value = '';
                msgInput.value = '';
                msgInput.style.height = 'auto';
                // No mostrar confesiones: await fetchConfessions();
                // scroll to top
                // document.getElementById('feed').scrollTo({ top: 0, behavior: 'smooth' });
            } catch {
                showError('Error al enviar. Intenta de nuevo.');
            } finally {
                sendBtn.disabled = false;
                sendBtn.classList.remove('loading');
                sendBtn.innerHTML = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#0d0118"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>`;
            }
        }

        // ── Delete flow ──
        function askDelete(id) {
            pendingDeleteId = id;
            document.getElementById('confirmOverlay').classList.add('show');
        }

        function closeConfirm() {
            pendingDeleteId = null;
            document.getElementById('confirmOverlay').classList.remove('show');
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (!pendingDeleteId) return;
            closeConfirm();
            try {
                const res = await fetch(`${API_URL}/${pendingDeleteId}`, { method: 'DELETE' });
                if (!res.ok) throw new Error();
                await fetchConfessions();
            } catch {
                showError('Error al borrar');
            }
        });

        document.getElementById('confirmOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeConfirm();
        });

        // ── Render ──
        function renderConfessions(list) {
            const feed = document.getElementById('feed');
            if (!list.length) {
                feed.innerHTML = `
                    <div class="state-msg">
                        <div class="icon">🌙</div>
                        <p>Aún no hay confesiones</p>
                        <small>Sé el primero en escribir algo</small>
                    </div>`;
                return;
            }
            feed.innerHTML = '';
            list.forEach(c => feed.appendChild(createCard(c)));
        }

        function createCard(c) {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                <div class="card-header">
                    <span class="card-author">${esc(c.author || 'Anónimo')}</span>
                    <button class="card-delete" onclick="askDelete('${c._id}')" aria-label="Borrar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
                        </svg>
                    </button>
                </div>
                <p class="card-message">${esc(c.message)}</p>
                <p class="card-date">${fmt(c.createdAt)}</p>
            `;
            return el;
        }

        function esc(t = '') {
            const d = document.createElement('div');
            d.textContent = t;
            return d.innerHTML;
        }

        function fmt(d) {
            return new Date(d).toLocaleString('es-MX', {
                day: '2-digit', month: 'short', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }

        // ── Keyboard shortcut ──
        msgInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitConfession();
        });

        fetchConfessions();
    </script>
</body>
</html>
