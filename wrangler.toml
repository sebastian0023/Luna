name = "luna"
main = "src/index.js"
compatibility_date = "2024-12-16"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "luna-production"

[env.development]
name = "luna-development"

# Configurar las rutas
routes = [
  { pattern = "example.com/api/*", zone_name = "example.com" },
  { pattern = "*.example.com/api/*", zone_name = "example.com" }
]

# Archivos estáticos
assets = { directory = "public", binding = "ASSETS" }

# Variables de entorno
[env.production.vars]
ENVIRONMENT = "production"

[env.development.vars]
ENVIRONMENT = "development"

# Bindings de Workers (D1, KV, etc.)
[[kv_namespaces]]
binding = "KV_CACHE"
id = "f7aaab86d474fca548d8d9c1e8695390"
preview_id = "f7aaab86d474fca548d8d9c1e8695390"

# Para MongoDB, usar variables de secreto
# Ejecutar: wrangler secret put MONGO_URI
